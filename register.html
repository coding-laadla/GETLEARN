<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | GETLEARN</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- ===== NAVBAR ===== -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary px-4">
    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="#">
            <img src="logo.jpg" alt="GETLEARN Logo" width="40" height="40" class="me-2">
            <div>
                <div class="fw-bold">GETLEARN</div>
                <small class="text-white-50">learning in minutes</small>
            </div>
        </a>

        <div>
            <a href="index.html" class="btn btn-outline-light me-2">Home</a>
            <a href="login.html" class="btn btn-light">Login</a>
        </div>
    </div>
</nav>

<!-- ===== REGISTER FORM ===== -->
<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="col-md-5">
        <div class="card shadow p-4">
            <h3 class="text-center mb-4">Create Account</h3>

            <form>
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="name" class="form-control" placeholder="Enter your full name">
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="Enter your email">
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Create password">
                </div>

                <div class="mb-3">
                    <label class="form-label">Select Role</label>
                    <select id="role" class="form-select">
                        <option value="">Select Role</option>
                        <option>Student</option>
                        <option>Teacher</option>
                        <option>PhD Holder</option>
                        <option>Employee</option>
                    </select>
                </div>

                <button type="button" onclick="register()" class="btn btn-success w-100">
                    Register
                </button>
            </form>

            <p class="text-center mt-3">
                Already have an account?
                <a href="login.html" class="text-decoration-none">Login</a>
            </p>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
