<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Profile | GETLEARN</title>
    <link rel="stylesheet" href="profile.css">
</head>
<body>
<div class="sidebar">
    <h2>GETLEARN</h2>
    <a href="dashboard.html">🏠 Home</a>
    <a href="profile.html">👤 Profile</a>
    <a href="statistics.html">📊 Statistics</a>
    <a href="earnings.html">💰 Earnings</a>
</div>

<div class="container">

    <h2>User Profile 👤</h2>

    <!-- FORM -->
    <div class="form-section">
        <input type="text" id="name" placeholder="Full Name">
        <input type="number" id="age" placeholder="Age">
        <input type="text" id="gender" placeholder="Gender">
        <input type="text" id="phone" placeholder="Phone Number">
        <input type="email" id="email" placeholder="Email ID">
        <input type="text" id="education" placeholder="Education">
        <textarea id="address" placeholder="Address"></textarea>

        <button onclick="saveProfile()">Save Profile</button>
    </div>

    <!-- DISPLAY -->
    <div class="profile-display">
        <h3>Saved Details</h3>

        <p><b>Name:</b> <span id="p_name"></span></p>
        <p><b>Age:</b> <span id="p_age"></span></p>
        <p><b>Gender:</b> <span id="p_gender"></span></p>
        <p><b>Phone:</b> <span id="p_phone"></span></p>
        <p><b>Email:</b> <span id="p_email"></span></p>
        <p><b>Education:</b> <span id="p_education"></span></p>
        <p><b>Address:</b> <span id="p_address"></span></p>
    </div>

</div>

<script src="profile.js"></script>
</body>
</html>
