<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | GETLEARN</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- ===== NAVBAR ===== -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary px-4">
    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="#">
            <img src="logo.jpg" alt="GETLEARN Logo" width="40" height="40" class="me-2">
            <div>
                <div class="fw-bold">GETLEARN</div>
                <small class="text-white-50">learning in minutes</small>
            </div>
        </a>

        <div>
            <a href="index.html" class="btn btn-outline-light me-2">Home</a>
            <a href="register.html" class="btn btn-light">Register</a>
        </div>
    </div>
</nav>

<!-- ===== LOGIN FORM ===== -->
<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="col-md-4">
        <div class="card shadow p-4">
            <h3 class="text-center mb-4">Login</h3>

            <form onsubmit="redirectToDashboard(event)">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" id="loginEmail" class="form-control" placeholder="Enter your email">
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" id="loginPassword" class="form-control" placeholder="Enter your password">
                </div>

                <div class="d-flex justify-content-between mb-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox">
                        <label class="form-check-label">Remember me</label>
                    </div>

                    <a href="forgot-password.html" class="text-decoration-none">
                        Forgot Password?
                    </a>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                Login
                </button>
            </form>

            <p class="text-center mt-3">
                Don’t have an account?
                <a href="register.html">Register</a>
            </p>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
